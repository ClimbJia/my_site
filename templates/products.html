{% extends "base.html" %}
{% load static %}

{% block title %}产品与方案 - 小书仔{% endblock %}

{% block content %}
<section class="page-hero">
    <div class="container">
        <h1 class="page-title">{{ page_title }}</h1>
        <p class="page-subtitle">{{ page_subtitle }}</p>
    </div>
</section>
<section class="section">
    <div class="container">
        <div class="product-grid">
            {% for item in items %}
            <a href="{% url 'product_detail' item.id %}" class="card product-card">
                <div class="card-placeholder"{% if item.poster_url %} style="background-image:url('{{ item.poster_url }}');background-size:cover;background-position:center;"{% endif %}></div>
                <h3 class="card-title">{{ item.title }}</h3>
                <p class="card-desc">{{ item.desc }}</p>
            </a>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
